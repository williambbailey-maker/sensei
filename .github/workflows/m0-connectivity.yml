name: M0 Connectivity Test

# Milestone 0 — HARD GATE.
# Proves whether a given runner can reach Dutchie's embedded product JSON
# before any of the real pipeline gets built.
#
# Strategy (first method that returns embedded product JSON wins):
#   1. Plain `requests` GET with realistic browser headers.
#   2. Unblocker API — only if a ScraperAPI/ScrapingBee key secret is set. The
#      service solves Cloudflare server-side; keeps hosted Actions + phone-only.
#   3. Playwright headless Chromium.
#   Report METHOD_THAT_WORKED = requests | unblocker | playwright | BLOCKED in the
#   job summary, and dump the first 2KB of HTML either way.
#
# Getting past Cloudflare:
#   GitHub's hosted runners (ubuntu-latest) run on datacenter IPs that Cloudflare
#   blocks at Dutchie — the first M0 run came back BLOCKED (HTTP 403, "Just a
#   moment..." challenge) on both requests and Playwright. Two ways to unblock:
#     - Unblocker API: add secret SCRAPERAPI_KEY *or* SCRAPINGBEE_KEY, keep
#       runner_label = ubuntu-latest. See .github/scripts/README-unblocker.md.
#     - Different runner: register a self-hosted runner on a residential IP and
#       set runner_label to its label. See .github/scripts/README-selfhosted-runner.md.

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: "Runner to test from (hosted 'ubuntu-latest', or a self-hosted runner label like 'self-hosted')"
        required: true
        default: "ubuntu-latest"

jobs:
  connectivity:
    runs-on: ${{ github.event.inputs.runner_label }}
    timeout-minutes: 15
    env:
      TARGET_URL: "https://dutchie.com/dispensary/conbud-les/products/flower"
      # Optional — set either one as a repo secret to enable the unblocker method.
      # If neither is set, the gate simply skips that attempt.
      SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
      SCRAPINGBEE_KEY: ${{ secrets.SCRAPINGBEE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "requests>=2.31" "playwright>=1.44"
          # Chromium is only used for the fallback, but install it up front so the
          # fallback path can't fail on a missing browser.
          python -m playwright install --with-deps chromium

      - name: Probe Dutchie connectivity
        run: python .github/scripts/m0_connectivity.py
