name: Daily Scrape

# Build step 3: the pipeline (scrape -> Supabase). Tagging comes in step 4.
#
# cron 10:00 UTC = 6am ET. Also manually dispatchable with knobs for cheap
# verification runs (dry run / store limit / categories).
#
# Secrets:
#   SCRAPINGBEE_KEY            required (unblocker — M0 outcome)
#   SUPABASE_SERVICE_ROLE_KEY  required for DB writes; if missing the run
#                              degrades to a dry run instead of failing

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (scrape + parse, no DB writes)"
        type: boolean
        default: false
      store_limit:
        description: "Only scrape N stores (0 = all)"
        default: "0"
      categories:
        description: "Comma-separated category pages"
        default: "flower"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SCRAPINGBEE_KEY: ${{ secrets.SCRAPINGBEE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      STORE_LIMIT: ${{ github.event.inputs.store_limit || '0' }}
      CATEGORIES: ${{ github.event.inputs.categories || 'flower' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        run: python main.py
