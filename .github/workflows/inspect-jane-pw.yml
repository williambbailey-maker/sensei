name: Inspect Jane (Playwright)

# Throwaway: drive iheartjane.com with a real browser (free — Jane isn't
# Cloudflare-walled) and capture its API + Algolia network calls.

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Jane URL to load"
        default: "https://www.iheartjane.com/stores"

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      JANE_URL: ${{ github.event.inputs.url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt "playwright>=1.44"
          python -m playwright install --with-deps chromium

      - name: Capture Jane network
        working-directory: pipeline
        run: python inspect_jane_pw.py
